<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">Edge Processing vs Cloud Processing: Key Trade-offs</text>

  <!-- Column headers -->
  <!-- Edge column -->
  <rect x="60" y="60" width="300" height="50" rx="8" fill="#1a365d"/>
  <text x="210" y="91" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Edge Processing</text>

  <!-- Cloud column -->
  <rect x="440" y="60" width="300" height="50" rx="8" fill="#4299e1"/>
  <text x="590" y="91" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Cloud Processing</text>

  <!-- Metric labels (center) -->
  <text x="400" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a365d">LATENCY</text>
  <text x="400" y="225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a365d">PRIVACY</text>
  <text x="400" y="295" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a365d">POWER</text>
  <text x="400" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a365d">COST</text>
  <text x="400" y="435" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a365d">COMPUTE</text>

  <!-- Divider lines -->
  <line x1="80" y1="125" x2="720" y2="125" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="195" x2="720" y2="195" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="265" x2="720" y2="265" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="335" x2="720" y2="335" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="405" x2="720" y2="405" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Edge values -->
  <rect x="70" y="130" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="210" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78">~10-100 ms</text>
  <text x="210" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">Deterministic, local</text>

  <rect x="70" y="200" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="210" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78">Data stays on device</text>
  <text x="210" y="240" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">No cloud exposure</text>

  <rect x="70" y="270" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="210" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ed8936">1-4 W (SoC)</text>
  <text x="210" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">Battery/USB-C viable</text>

  <rect x="70" y="340" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="210" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78">One-time hardware</text>
  <text x="210" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">No recurring cloud fees</text>

  <rect x="70" y="410" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="210" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#e53e3e">Constrained</text>
  <text x="210" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">Limited model complexity</text>

  <!-- Cloud values -->
  <rect x="450" y="130" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="590" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#e53e3e">100-500 ms+</text>
  <text x="590" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">Variable, network-dependent</text>

  <rect x="450" y="200" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="590" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#e53e3e">Data leaves device</text>
  <text x="590" y="240" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">Requires encryption + policy</text>

  <rect x="450" y="270" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="590" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78">~0.5 W (radio only)</text>
  <text x="590" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">Offloads compute to cloud</text>

  <rect x="450" y="340" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="590" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#e53e3e">Recurring fees</text>
  <text x="590" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">Scales with usage volume</text>

  <rect x="450" y="410" width="280" height="50" rx="6" fill="#ebf8ff" filter="url(#shadow)"/>
  <text x="590" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78">Virtually unlimited</text>
  <text x="590" y="450" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2b6cb0">GPU clusters, large models</text>

  <!-- Figure label -->
  <text x="400" y="490" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#718096">Figure 1 -- Edge vs Cloud Processing Trade-offs for Sensor Fusion Applications</text>
</svg>